parameters:
  package: ''
  isPr: false

jobs:
  - job: Build_Publish_UI
    displayName: '${{ parameters.package }} Build'

    steps:
      - task: UseNode@1
        displayName: NVM Use
        inputs:
          version: 24.11.1

      - task: NPM@1
        displayName: "Install PNPM"
        inputs:
          command: custom
          customCommand: |
            install -g pnpm
          
      - task: Npm@1
        displayName: "NPM Install"
        inputs:
          command: ci
          verbose: true   

      - task: Npm@1
        displayName: "Lint"
        inputs:
          command: custom
          customCommand: "run lint"
          verbose: true           

      - task: Npm@1
        displayName: "Run Unit Tests"
        inputs:
          command: custom
          customCommand: "run test:silent"          
          verbose: true

      - task: Npm@1
        displayName: "Set Build Number"
        inputs:
          command: custom
          customCommand: "version $(Build.BuildNumber) --no-git-tag-version"          
          verbose: true

      - task: Npm@1
        displayName: "NPM Build"
        inputs:
          command: custom
          customCommand: "run build"          
          verbose: true

      - bash: |
          cp ./staticwebapp.config.json ./dist/staticwebapp.config.json
        displayName: "Copy Static WebApp Config"
        condition: and(succeeded(), ${{ eq(parameters.isPr, false) }})
        failOnStderr: true

      - task: ArchiveFiles@2
        displayName: "Archive"
        inputs:
          includeRootFolder: false
          rootFolderOrFile: "dist"
          archiveFile: "$(Build.ArtifactStagingDirectory)/WebUI-SPA-$(Build.BuildId).zip"
          condition: and(succeeded(), ${{ eq(parameters.isPr, false) }})

      - task: PublishPipelineArtifact@1
        displayName: "Publish Artifact to Devops"
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/WebUI-SPA-$(Build.BuildId).zip"
          artifact: WebUI-SPA
          condition: and(succeeded(), ${{ eq(parameters.isPr, false) }})

  - job: Publish_Infra
    displayName: "Publish Infra Files"
    condition: ${{ eq(parameters.isPr, false) }}
    steps:
    - publish: "$(Build.SourcesDirectory)/devops/terraform"
      displayName: "Publish TF Files"
      artifact: "TF-Files"

